name: NRW Thermal Risk Index

on:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC (= 10:00 CET / 11:00 CEST)
  workflow_dispatch:        # manual trigger via Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (eccodes + GDAL for rasterio/geopandas)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libeccodes-dev \
            libgdal-dev \
            gdal-bin \
            libspatialindex-dev \
            fonts-dejavu-core

      - name: Install Python packages
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run forecast + map generation
        run: python fetch_weather.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/thermal_index_nrw.json \
                  output/thermal_index_nrw.geojson \
                  output/thermal-risk-map-nrw-today.jpg \
                  README.md
          if git diff --cached --quiet; then
            echo "No changes – nothing to commit."
          else
            git commit -m "chore: thermal risk index $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
