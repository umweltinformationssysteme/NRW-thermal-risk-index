name: NRW Thermischer Gefahrenindex – Tägliche Aktualisierung

on:
  schedule:
    # Täglich 09:00 UTC (= 10:00 MEZ / 11:00 MESZ)
    - cron: "0 9 * * *"
  # Manueller Start über GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write   # README.md und output/ committen

jobs:
  update-thermal-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      - name: Repository auschecken
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # -----------------------------------------------------------------------
      - name: Systemabhängigkeiten (eccodes für cfgrib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libeccodes-dev

      # -----------------------------------------------------------------------
      - name: Python-Pakete installieren
        run: pip install --upgrade pip && pip install -r requirements.txt

      # -----------------------------------------------------------------------
      - name: Vorhersage abrufen und README aktualisieren
        run: python fetch_weather.py
        env:
          PYTHONUNBUFFERED: "1"

      # -----------------------------------------------------------------------
      - name: Ergebnisse committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/weather_data.json README.md

          # Nur committen wenn tatsächlich Änderungen vorliegen
          if git diff --cached --quiet; then
            echo "Keine Änderungen – kein Commit nötig."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: Thermischer Gefahrenindex aktualisiert – ${TIMESTAMP}"
            git push
          fi
