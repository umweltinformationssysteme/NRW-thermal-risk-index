name: Update NRW Thermal Index

on:
  schedule:
    # Runs daily at 05:00 UTC (06:00 or 07:00 German time)
    - cron: '0 5 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies (ecCodes)
        run: |
          # Update package lists to find libeccodes
          sudo apt-get update
          # libeccodes-dev is the standard package for Ubuntu environments
          sudo apt-get install -y libeccodes-dev

      - name: Install Python libraries
        run: |
          # Upgrade pip and install required Python packages
          python -m pip install --upgrade pip
          pip install pandas xarray cfgrib requests

      - name: Run weather update script
        # Executes the logic to download GRIB2 and process NRW municipalities
        run: python scripts/fetch_weather.py

      - name: Commit and push updated JSON
        run: |
          # Set up git user for the automated commit
          git config --global user.name "WeatherBot"
          git config --global user.email "actions@github.com"
          
          # Only commit if the output file has actually changed
          git add output/weather_data.json
          git commit -m "Automated weather update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # Push the changes back to the repository
          git push
